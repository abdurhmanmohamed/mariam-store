<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="checkout_page_title">Checkout - Mariam Boutique</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Ambient background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Navigation -->
    <header class="navbar glass">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-text" data-i18n="brand" style="text-decoration: none;">Romaire</a>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="index.html#shop" data-i18n="nav_shop">Shop</a>
                <a href="index.html#collections" data-i18n="nav_collections">Collections</a>
                <a href="dashboard.html" data-i18n="nav_admin">Admin</a>
                <a href="index.html#about" data-i18n="nav_about">About</a>
            </nav>

            <div class="nav-actions">
                <button id="lang-toggle" class="btn-text">
                    <span data-i18n="toggle_lang">عربي</span>
                </button>
                <button class="icon-btn search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="icon-btn account-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
                <button class="icon-btn settings-btn" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Checkout View -->
    <main class="container" style="padding-top: 120px; min-height: 70vh">
      <div style="margin-bottom: 2rem; text-align: center">
        <h1
          data-i18n="checkout_page_title"
          style="
            font-size: 2.5rem;
            color: var(--c-primary);
            margin-bottom: 0.5rem;
          "
        >
          Secure Checkout
        </h1>
        <p
          data-i18n="checkout_subtitle"
          style="color: var(--c-text-light); font-size: 1.1rem"
        >
          Please enter your details to complete the purchase.
        </p>
      </div>

      <div class="checkout-layout">
        <!-- Form Section -->
        <div class="glass checkout-panel fade-in">
          <h2 data-i18n="shipping_details" class="panel-title">
            Shipping Details
          </h2>
          <div class="form-grid">
            <div class="form-group">
              <label data-i18n="f_first_name">First Name</label>
              <input type="text" class="form-control" placeholder="Mariam" />
            </div>
            <div class="form-group">
              <label data-i18n="f_last_name">Last Name</label>
              <input type="text" class="form-control" placeholder="Al-Fayed" />
            </div>
            <div class="form-group full-width">
              <label data-i18n="f_address">Street Address</label>
              <input
                type="text"
                class="form-control"
                placeholder="123 Elegance Blvd"
              />
            </div>
            <div class="form-group">
              <label data-i18n="f_city">City</label>
              <input type="text" class="form-control" placeholder="Dubai" />
            </div>
            <div class="form-group">
              <label data-i18n="f_phone">Phone Number</label>
              <input
                type="tel"
                class="form-control"
                placeholder="+971 50 123 4567"
              />
            </div>
          </div>

          <h2
            data-i18n="payment_details"
            class="panel-title"
            style="margin-top: 2.5rem"
          >
            Payment Method
          </h2>
          <div class="form-grid">
            <div class="form-group full-width text-center payment-icons">
              <!-- Simulated Payment Cards -->
              <div class="card-icon active">
                <svg
                  width="30"
                  height="30"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                  <line x1="1" y1="10" x2="23" y2="10"></line>
                </svg>
              </div>
            </div>
            <div class="form-group full-width">
              <label data-i18n="f_card_number">Card Number</label>
              <input
                type="text"
                class="form-control"
                placeholder="0000 0000 0000 0000"
              />
            </div>
            <div class="form-group">
              <label data-i18n="f_expiry">Expiry Date</label>
              <input type="text" class="form-control" placeholder="MM/YY" />
            </div>
            <div class="form-group">
              <label data-i18n="f_cvv">CVV</label>
              <input
                type="password"
                class="form-control"
                placeholder="123"
                maxlength="3"
              />
            </div>
          </div>

          <button
            class="btn-primary w-100"
            style="margin-top: 2rem; padding: 1.2rem; font-size: 1.2rem"
          >
            <span data-i18n="btn_pay_now">Pay Now</span>
          </button>
        </div>

        <!-- Order Summary Sidebar -->
        <div class="glass checkout-summary fade-in-delayed">
          <h2 data-i18n="order_summary" class="panel-title">Order Summary</h2>
          <div id="checkout-summary-items" class="summary-items">
            <!-- Populated by JS -->
          </div>

          <div class="summary-totals">
            <div class="summary-row">
              <span data-i18n="subtotal">Subtotal</span>
              <span id="checkout-subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span data-i18n="shipping">Shipping</span>
              <span data-i18n="free">Free</span>
            </div>
            <div class="divider"></div>
            <div class="summary-row total-row">
              <span data-i18n="cart_total">Total</span>
              <span id="checkout-total" style="color: var(--c-primary)"
                >$0.00</span
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
        <div class="container footer-content text-center">
            <span class="logo-text" data-i18n="brand">Romaire</span>
            <p data-i18n="footer_text">© 2026 Romaire. Designed with elegance.</p>
        </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
