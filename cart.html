<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="cart_page_title">Shopping Cart</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Ambient background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Navigation -->
    <header class="navbar glass">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-text" data-i18n="brand" style="text-decoration: none;">Romaire</a>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="index.html#shop" data-i18n="nav_shop">Shop</a>
                <a href="index.html#collections" data-i18n="nav_collections">Collections</a>
                <a href="dashboard.html" data-i18n="nav_admin">Admin</a>
                <a href="index.html#about" data-i18n="nav_about">About</a>
            </nav>

            <div class="nav-actions">
                <button id="lang-toggle" class="btn-text">
                    <span data-i18n="toggle_lang">عربي</span>
                </button>
                <button class="icon-btn search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="icon-btn account-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
                <button class="icon-btn settings-btn" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button class="icon-btn cart-btn" id="open-cart-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <span class="cart-badge" id="cart-count-badge" style="display:none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Cart View -->
    <main class="container" style="padding-top: 150px; min-height: 70vh">
      <div style="margin-bottom: 3rem; text-align: center">
        <h1
          data-i18n="cart_page_title"
          style="
            font-size: 3rem;
            color: var(--c-primary);
            margin-bottom: 0.5rem;
          "
        >
          Shopping Cart
        </h1>
        <p
          data-i18n="cart_page_desc"
          style="color: var(--c-text-light); font-size: 1.1rem"
        >
          Review your selected items beautifully.
        </p>
      </div>

      <div
        id="full-cart-container"
        class="glass fade-in"
        style="
          padding: 3rem;
          border-radius: 30px;
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        "
      >
        <!-- This will be populated by JavaScript updateCartUI() -->
      </div>
    </main>

    <footer class="footer">
        <div class="container footer-content text-center">
            <span class="logo-text" data-i18n="brand">Romaire</span>
            <p data-i18n="footer_text">© 2026 Romaire. Designed with elegance.</p>
        </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
