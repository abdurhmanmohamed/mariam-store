<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Admin | Romaire Boutique</title>
  
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icons/favicon.png') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/roma-theme.css') }}">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(251, 203, 219, 0.4);
    }

    body {
      background: linear-gradient(135deg, #fff5f7 0%, #fdeff4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      font-family: var(--font-body, 'Quicksand', sans-serif);
      margin: 0;
      position: relative;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(80px);
    }
    body::before { background: rgba(251, 203, 219, 0.5); top: -100px; left: -100px; }
    body::after { background: rgba(255, 140, 105, 0.2); bottom: -100px; right: -100px; }

    .register-container {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 50px 40px;
      border-radius: 35px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(251, 203, 219, 0.4);
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo { width: 80px; margin-bottom: 20px; }

    h1 {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      font-weight: 800;
      font-size: 2rem;
      color: var(--roma-text);
      margin-bottom: 5px;
    }

    .subtitle {
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      color: var(--roma-accent);
      font-weight: 600;
      margin-bottom: 30px;
    }

    form { display: flex; flex-direction: column; gap: 18px; }

    .input-wrapper { position: relative; text-align: left; }

    .input-wrapper label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      color: #a09295;
      font-size: 0.9rem;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 20px;
      border: 1.5px solid rgba(251, 203, 219, 0.4);
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.5);
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      border-color: var(--roma-accent);
      background: #fff;
      box-shadow: 0 8px 20px rgba(251, 203, 219, 0.15);
    }

    .input-wrapper input:focus + label,
    .input-wrapper input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 0.7rem;
      color: var(--roma-accent);
      background: #fff;
      padding: 0 8px;
      border-radius: 4px;
      font-weight: 700;
      transform: translateY(-50%) translateX(-5px);
    }

    .toggle-btn {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--roma-accent);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    button {
      background: linear-gradient(135deg, var(--roma-primary), var(--roma-primary-hover));
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: var(--font-heading);
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(251, 203, 219, 0.4);
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(251, 203, 219, 0.6);
    }

    .footer-links { margin-top: 25px; display: flex; flex-direction: column; gap: 8px; }
    .footer-links a { color: #a09295; text-decoration: none; font-size: 0.85rem; font-weight: 600; }
    .footer-links a:hover { color: var(--roma-accent); }

    .alert { border-radius: 15px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="register-container">
    <img src="{{url_for('static', filename='imgs/romaire.png')}}" alt="Logo" class="brand-logo">
    <h1>Register Admin</h1>
    <div class="subtitle">إنشاء حساب مسئول جديد</div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{messages[0]}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endif %}
    {% endwith %}

    <form action="{{url_for('register')}}" method="POST">
      <div class="input-wrapper">
        <input type="text" id="name" name="name" placeholder=" " required value="{{name or ''}}">
        <label for="name">Full Name</label>
      </div>

      <div class="input-wrapper">
        <input type="number" id="number" name="number" placeholder=" " required value="{{number or ''}}">
        <label for="number">Phone Number</label>
      </div>

      <div class="input-wrapper">
        <input type="password" id="password" name="password" placeholder=" " required>
        <label for="password">Password</label>
        <span class="toggle-btn" onclick="togglePass('password', this)">Show</span>
      </div>

      <div class="input-wrapper">
        <input type="password" id="c_password" name="c_password" placeholder=" " required>
        <label for="c_password">Confirm Password</label>
        <span class="toggle-btn" onclick="togglePass('c_password', this)">Show</span>
      </div>

      <button type="submit">Create Admin Account</button>
    </form>

    <div class="footer-links">
      <a href="{{url_for('login')}}">Already have an admin account? Sign in</a>
      <a href="{{url_for('home')}}">← Back to Boutique</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }
  </script>
</body>
</html>
