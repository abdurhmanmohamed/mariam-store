<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | Romaire Boutique</title>
  
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icons/favicon.png') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/roma-theme.css') }}">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(251, 203, 219, 0.4);
    }

    body {
      background: linear-gradient(135deg, #fff5f7 0%, #fdeff4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      font-family: var(--font-body, 'Quicksand', sans-serif);
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background blobs */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(80px);
    }
    body::before {
      background: rgba(251, 203, 219, 0.6);
      top: -100px;
      left: -100px;
    }
    body::after {
      background: rgba(255, 140, 105, 0.3);
      bottom: -100px;
      right: -100px;
    }

    .login-container {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 50px 40px;
      border-radius: 35px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(251, 203, 219, 0.4);
      width: 100%;
      max-width: 450px;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      width: 90px;
      margin-bottom: 25px;
      filter: drop-shadow(0 5px 15px rgba(251, 203, 219, 0.5));
    }

    h1 {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      font-weight: 800;
      font-size: 2.2rem;
      color: var(--roma-text);
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      color: var(--roma-accent);
      font-weight: 600;
      margin-bottom: 35px;
      letter-spacing: 0.5px;
    }

    /* Styled Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-wrapper {
      position: relative;
      text-align: left;
    }

    .input-wrapper label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      color: #a09295;
      font-size: 0.95rem;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      background: transparent;
      padding: 0 5px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid rgba(251, 203, 219, 0.5);
      border-radius: 18px;
      outline: none;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
      font-family: var(--font-body);
      color: var(--roma-text);
    }

    .input-wrapper input:focus {
      border-color: var(--roma-accent);
      background: #fff;
      box-shadow: 0 8px 20px rgba(251, 203, 219, 0.2);
    }

    .input-wrapper input:focus + label,
    .input-wrapper input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 0.75rem;
      color: var(--roma-accent);
      background: #fff;
      padding: 0 8px;
      border-radius: 4px;
      font-weight: 700;
      transform: translateY(-50%) translateX(-5px);
    }

    .toggle-password {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--roma-accent);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
      transition: opacity 0.3s;
    }

    .toggle-password:hover {
      opacity: 0.7;
    }

    button {
      background: linear-gradient(135deg, var(--roma-primary), var(--roma-primary-hover));
      color: #fff;
      border: none;
      padding: 18px;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-heading);
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(251, 203, 219, 0.5);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      margin-top: 10px;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(251, 203, 219, 0.7);
      background: linear-gradient(135deg, var(--roma-primary-hover), var(--roma-accent));
    }

    .footer-links {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-links a {
      color: #a09295;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.3s;
    }

    .footer-links a:hover {
      color: var(--roma-accent);
    }

    .alert {
      border-radius: 15px;
      font-weight: 600;
      border: none;
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <a href="{{url_for('home')}}">
      <img src="{{url_for('static', filename='imgs/romaire.png')}}" alt="Logo" class="brand-logo">
    </a>
    <h1>Login Admin</h1>
    <div class="subtitle">تسجيل دخول مسئول النظام</div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{messages[0]}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    {% endif %}
    {% endwith %}

    <form action="{{url_for('login')}}" method="POST">
      <div class="input-wrapper">
        <input type="text" id="name" name="name" placeholder=" " required value="{{name or ''}}">
        <label for="name">Admin Name</label>
      </div>

      <div class="input-wrapper">
        <input type="number" id="number" name="number" placeholder=" " required value="{{number or ''}}">
        <label for="number">Phone Number</label>
      </div>

      <div class="input-wrapper">
        <input type="password" id="password" name="password" placeholder=" " required value="{{password or ''}}">
        <label for="password">Password</label>
        <span class="toggle-password" onclick="togglePass()">Show</span>
      </div>

      <button type="submit">Unlock Dashboard</button>
    </form>

    <div class="footer-links">
      <a href="{{url_for('home')}}">← Back to Boutique</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePass() {
      const passInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      if (passInput.type === 'password') {
        passInput.type = 'text';
        toggleBtn.textContent = 'Hide';
      } else {
        passInput.type = 'password';
        toggleBtn.textContent = 'Show';
      }
    }
  </script>
</body>
</html>
